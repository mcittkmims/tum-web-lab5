name: Release Native Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: go2web
            asset_name: go2web-linux-amd64
          - os: macos-latest
            artifact_name: go2web
            asset_name: go2web-macos-arm64
          - os: macos-26-intel
            artifact_name: go2web
            asset_name: go2web-macos-amd64
          - os: windows-latest
            artifact_name: go2web.exe
            asset_name: go2web-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build native binary
        run: mvn -Pnative -DskipTests package --no-transfer-progress

      - name: Ad-hoc sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - target/go2web

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir release
          cp target/go2web release/go2web
          cp scripts/install.sh release/install.sh
          cp scripts/uninstall.sh release/uninstall.sh
          chmod +x release/go2web release/install.sh release/uninstall.sh
          tar -czf ${{ matrix.asset_name }}.tar.gz -C release .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release
          cp target\go2web.exe release\go2web.exe
          cp scripts\install.ps1 release\install.ps1
          cp scripts\uninstall.ps1 release\uninstall.ps1
          Compress-Archive -Path release\* -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "go2web ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/go2web-linux-amd64/go2web-linux-amd64.tar.gz
            artifacts/go2web-macos-arm64/go2web-macos-arm64.tar.gz
            artifacts/go2web-macos-amd64/go2web-macos-amd64.tar.gz
            artifacts/go2web-windows-amd64/go2web-windows-amd64.zip
